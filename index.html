<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boro - Live Streams</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #00d4ff; margin-bottom: 20px; }
    .token-section { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .token-section label { display: block; margin-bottom: 8px; color: #aaa; }
    .token-section input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 4px; background: #0f0f23; color: #fff; font-size: 14px; }
    #searchSection input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 4px; background: #0f0f23; color: #fff; font-size: 14px; margin-bottom: 20px; }
    .token-section button { margin-top: 12px; padding: 10px 20px; background: #00d4ff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .token-section button:hover { background: #00b8e6; }
    .streams-list { display: grid; gap: 12px; }
    .stream-card { background: #16213e; padding: 16px; border-radius: 8px; border-left: 4px solid #00d4ff; }
    .stream-card h3 { color: #fff; margin-bottom: 8px; }
    .stream-card .meta { color: #888; font-size: 12px; margin-bottom: 12px; }
    .stream-card .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .stream-card button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .stream-card button:hover { background: #444; }
    .stream-card button.primary { background: #00d4ff; color: #000; }
    .stream-card .m3u8-url { background: #0f0f23; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 12px; word-break: break-all; color: #00ff88; }
    .m3u8-output { margin-top: 20px; background: #0f0f23; padding: 16px; border-radius: 8px; display: none; }
    .m3u8-output.visible { display: block; }
    .m3u8-output h3 { color: #00d4ff; margin-bottom: 12px; }
    .m3u8-output pre { background: #1a1a2e; padding: 12px; border-radius: 4px; overflow-x: auto; word-break: break-all; }
    .error { background: #ff4444; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 20px; display: none; }
    .error.visible { display: block; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .status.online { background: #00ff88; color: #000; }
    .status.offline { background: #666; color: #fff; }
    .boro-btn { background: #ff6b35; color: #fff; }
    .boro-btn:hover { background: #e55a2b; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
    .modal.visible { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: #16213e; padding: 24px; border-radius: 8px; max-width: 400px; width: 90%; }
    .modal-content h3 { color: #00d4ff; margin-bottom: 16px; }
    .modal-content select { width: 100%; padding: 12px; background: #0f0f23; color: #fff; border: 1px solid #333; border-radius: 4px; margin-bottom: 16px; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-buttons button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    .modal-buttons .cancel { background: #666; color: #fff; }
    .modal-buttons .confirm { background: #00d4ff; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Boro - Live Streams</h1>
    
    <div class="token-section">
      <label>JWT Token (de Mediastream):</label>
      <input type="password" id="jwtToken" placeholder="Pega tu token JWT aquí...">
      <button onclick="fetchStreams()">Cargar Lives</button>
    </div>

    <div id="searchSection" style="display: none;">
      <input type="text" id="searchStreams" placeholder="Buscar por nombre..." onkeyup="filterStreams()">
    </div>

    <div id="error" class="error"></div>

    <div id="streamsList" class="streams-list"></div>

    <div id="m3u8Output" class="m3u8-output">
      <h3>URL .m3u8 Generada</h3>
      <pre id="m3u8Url"></pre>
    </div>

    <div id="boroModal" class="modal">
      <div class="modal-content">
        <h3>Subir señal a Boro</h3>
        <p id="boroStreamName" style="color: #aaa; margin-bottom: 12px;"></p>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 8px;">Selecciona la zona:</p>
        <select id="boroZone">
          <option value="CO - Boro">CO - Boro</option>
          <option value="BR-SaoPaulo-Sensay">BR-SaoPaulo-Sensay</option>
          <option value="CL-VMSensay">CL-VMSensay</option>
          <option value="EU-EC2 Boro (Spain)">EU-EC2 Boro (Spain)</option>
          <option value="PE-EC2-Lima">PE-EC2-Lima</option>
          <option value="US-EC2-Boro">US-EC2-Boro</option>
          <option value="US-Link-SRT">US-Link-SRT</option>
        </select>
        <div class="modal-buttons">
          <button class="cancel" onclick="closeBoroModal()">Cancelar</button>
          <button class="confirm" onclick="submitToBoro()">Subir</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allStreams = [];
    let currentStreamData = null;

    async function loadSavedData() {
      const res = await fetch('/api/data');
      const data = await res.json();
      if (data.token) {
        document.getElementById('jwtToken').value = data.token;
      }
      if (data.streams && data.streams.length > 0) {
        renderStreams(data.streams);
        allStreams = data.streams;
        document.getElementById('searchSection').style.display = 'block';
      }
    }
    loadSavedData();

    async function fetchStreams() {
      const token = document.getElementById('jwtToken').value.trim();
      const errorDiv = document.getElementById('error');
      const streamsDiv = document.getElementById('streamsList');
      const m3u8Div = document.getElementById('m3u8Output');

      errorDiv.classList.remove('visible');
      m3u8Div.classList.remove('visible');
      streamsDiv.innerHTML = '';

      if (!token) {
        errorDiv.textContent = 'Por favor ingresa un token JWT';
        errorDiv.classList.add('visible');
        return;
      }

      try {
        const response = await fetch('/api/live-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        if (!response.ok) {
          throw new Error(`Error ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        if (!data.data || data.data.length === 0) {
          errorDiv.textContent = 'No se encontraron lives';
          errorDiv.classList.add('visible');
          return;
        }

        allStreams = data.data;
        renderStreams(allStreams);
        document.getElementById('searchSection').style.display = 'block';
      } catch (err) {
        errorDiv.textContent = 'Error: ' + err.message;
        errorDiv.classList.add('visible');
      }
    }

    function renderStreams(streams) {
      const streamsDiv = document.getElementById('streamsList');
      streamsDiv.innerHTML = '';
      
      streams.forEach(stream => {
        const streamId = stream._id || stream.id;
        const m3u8Url = `https://mdstrm.com/live-stream-playlist/${streamId}.m3u8`;
        const card = document.createElement('div');
        card.className = 'stream-card';
        
        const statusClass = stream.status === 'online' ? 'online' : 'offline';
        
        card.innerHTML = `
          <h3>${stream.name || 'Sin nombre'}</h3>
          <div class="meta">
            <span class="status ${statusClass}">${stream.status || 'offline'}</span>
            &nbsp;ID: ${streamId}
            ${stream.key ? `&nbsp;| Key: ${stream.key}` : ''}
          </div>
          <div class="m3u8-url">${m3u8Url}</div>
<div class="actions">
              <button class="primary" onclick="copyM3u8('${m3u8Url}')">Copiar .m3u8</button>
              <button onclick="copyId('${streamId}')">Copiar ID</button>
              <button class="boro-btn" onclick="openBoroModal('${stream.name}', '${m3u8Url}')">Subir señal a Boro</button>
            </div>
        `;
        streamsDiv.appendChild(card);
      });
    }

    function copyM3u8(url) {
      navigator.clipboard.writeText(url);
    }

    function copyId(streamId) {
      navigator.clipboard.writeText(streamId);
    }

    function filterStreams() {
      const query = document.getElementById('searchStreams').value.toLowerCase();
      const filtered = allStreams.filter(s => (s.name || '').toLowerCase().includes(query));
      renderStreams(filtered);
    }

    function openBoroModal(streamName, m3u8Url) {
      currentStreamData = { name: streamName, m3u8: m3u8Url };
      document.getElementById('boroStreamName').textContent = streamName;
      document.getElementById('boroModal').classList.add('visible');
    }

    function closeBoroModal() {
      document.getElementById('boroModal').classList.remove('visible');
      currentStreamData = null;
    }

    async function submitToBoro() {
      const zone = document.getElementById('boroZone').value;
      const streamName = currentStreamData.name;
      const m3u8Url = currentStreamData.m3u8;
      closeBoroModal();
      
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = `Subiendo "${streamName}" a ${zone}...`;
      errorDiv.classList.add('visible');

      try {
        const response = await fetch('/api/submit-to-boro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ streamName, m3u8Url, zone })
        });
        
        const result = await response.json();
        if (result.success) {
          errorDiv.textContent = `✓ Señal "${streamName}" subida a ${zone} exitosamente`;
          errorDiv.style.background = '#00ff88';
          errorDiv.style.color = '#000';
        } else {
          errorDiv.textContent = 'Error: ' + result.error;
        }
      } catch (err) {
        errorDiv.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
